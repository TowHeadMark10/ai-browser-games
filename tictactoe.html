<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.6rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 18px 4px rgba(168, 218, 220, 0.4);
    }

    #restart {
      margin-top: 2rem;
      padding: 0.7rem 2.2rem;
      font-size: 1rem;
      border: 2px solid #e94560;
      background: transparent;
      color: #e94560;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
    }

    #restart:hover {
      background: #e94560;
      color: #fff;
    }

    #score {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
    }

    .score-box .label { color: #888; font-size: 0.8rem; letter-spacing: 1px; }
    .score-box .num   { font-size: 2rem; font-weight: bold; }
    .score-box.x-score .num { color: #e94560; }
    .score-box.o-score .num { color: #a8dadc; }
    .score-box.draw-score .num { color: #888; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="score">
    <div class="score-box x-score">
      <div class="label">X</div>
      <div class="num" id="score-x">0</div>
    </div>
    <div class="score-box draw-score">
      <div class="label">DRAW</div>
      <div class="num" id="score-draw">0</div>
    </div>
    <div class="score-box o-score">
      <div class="label">O</div>
      <div class="num" id="score-o">0</div>
    </div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over;
    const scores = { X: 0, O: 0, draw: 0 };

    const cells   = document.querySelectorAll('.cell');
    const status  = document.getElementById('status');
    const scoreX  = document.getElementById('score-x');
    const scoreO  = document.getElementById('score-o');
    const scoreDr = document.getElementById('score-draw');

    function init() {
      board   = Array(9).fill('');
      current = 'X';
      over    = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className   = 'cell';
      });
      status.textContent = "X's turn";
    }

    function checkWin(player) {
      return WINS.find(combo => combo.every(i => board[i] === player)) || null;
    }

    function handleClick(e) {
      const cell = e.currentTarget;
      const i    = +cell.dataset.i;
      if (over || board[i]) return;

      board[i]          = current;
      cell.textContent  = current;
      cell.classList.add(current.toLowerCase(), 'taken');

      const win = checkWin(current);
      if (win) {
        win.forEach(i => cells[i].classList.add('win'));
        status.textContent = `${current} wins!`;
        scores[current]++;
        updateScores();
        over = true;
        return;
      }

      if (board.every(Boolean)) {
        status.textContent = "It's a draw!";
        scores.draw++;
        updateScores();
        over = true;
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      status.textContent = `${current}'s turn`;
    }

    function updateScores() {
      scoreX.textContent  = scores.X;
      scoreO.textContent  = scores.O;
      scoreDr.textContent = scores.draw;
    }

    cells.forEach(c => c.addEventListener('click', handleClick));
    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
